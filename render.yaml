services:
  - type: web
    name: campaignops-api
    runtime: node
    rootDir: .
    buildCommand: corepack enable && corepack prepare pnpm@10.22.0 --activate && pnpm install --frozen-lockfile && pnpm deploy:api:build
    startCommand: pnpm start:api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: campaignops-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: WEB_ORIGINS
        sync: false

databases:
  - name: campaignops-postgres
    databaseName: campaignops
    user: campaignops
